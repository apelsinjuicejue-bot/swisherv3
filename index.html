<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Swisher</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c1116">
<link rel="apple-touch-icon" href="swisher.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #0c1116;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  font-size: 18px;
}

.gear {
  width: 44px;
  height: 44px;
  background: #0f2a36;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.logo {
  width: 180px;
  margin-bottom: 40px;
}

.main-btn {
  width: 80%;
  max-width: 320px;
  padding: 18px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(180deg, #36a9d6, #1c86b8);
  color: white;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 40px;
}

.qr-row {
  display: flex;
  gap: 50px;
}

.qr-item {
  text-align: center;
  font-size: 14px;
  color: #9aa4ad;
}

.qr-circle {
  width: 70px;
  height: 70px;
  background: #0f2a36;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}

.qr-circle svg {
  width: 28px;
  height: 28px;
  fill: #36a9d6;
}

.bottom {
  background: #0c1116;
  border-top: 1px solid #111;
  padding: 10px 0 20px;
}

.nav {
  display: flex;
  justify-content: space-around;
  font-size: 12px;
  color: #9aa4ad;
}

.nav-item {
  text-align: center;
}

.nav-item.active {
  color: white;
}
</style>
</head>

<body>

<div class="top">
  <div>Swedbank</div>
  <div class="gear">⚙️</div>
</div>

<div class="container">
  <img src="swisher.png" class="logo">

  <button class="main-btn">Swisha</button>

  <div class="qr-row">
    <div class="qr-item">
      <div class="qr-circle">
        <svg viewBox="0 0 24 24">
          <path d="M3 3h6v6H3V3zm12 0h6v6h-6V3zM3 15h6v6H3v-6zm12 0h6v6h-6v-6z"/>
        </svg>
      </div>
      Min QR
    </div>

    <div class="qr-item">
      <div class="qr-circle">
        <svg viewBox="0 0 24 24">
          <path d="M4 4h4v2H6v2H4V4zm10 0h4v4h-2V6h-2V4zM4 14h2v2h2v2H4v-4zm14 0h2v4h-4v-2h2v-2z"/>
        </svg>
      </div>
      Skanna QR
    </div>
  </div>
</div>

<div class="bottom">
  <div class="nav">
    <div class="nav-item active">Hem</div>
    <div class="nav-item">Förfrågningar</div>
    <div class="nav-item">Historik</div>
  </div>
</div>

</body>
</html>
