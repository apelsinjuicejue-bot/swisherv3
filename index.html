```html
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swish</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial;
background:#031a2a;
color:white;
overflow:hidden;
}

.container{
display:flex;
width:300vw;
height:100vh;
transition:0.4s;
}

.screen{
width:100vw;
height:100vh;
flex-shrink:0;
position:relative;
}

.home{
padding:20px;
}

.header{
display:flex;
align-items:center;
gap:14px;
margin-top:20px;
}

.header img{
width:40px;
}

.title{
font-size:28px;
font-weight:600;
}

.bank{
color:#8ea3b5;
font-size:16px;
}

.card{
margin-top:25px;
border-radius:26px;
background:#071f34;
border:1px solid #1c3550;
padding:18px;
}

.card img{
width:100%;
border-radius:16px;
margin-bottom:10px;
}

.card-title{
font-size:22px;
}

.buttons{
position:absolute;
bottom:120px;
width:100%;
display:flex;
gap:20px;
padding:0 20px;
box-sizing:border-box;
}

.btn{
flex:1;
padding:20px;
border-radius:22px;
border:none;
font-size:24px;
color:white;
}

.swish{
background:#1987c6;
}

.scan{
background:#243d5b;
}

.nav{
position:absolute;
bottom:0;
width:100%;
height:90px;
background:#031a2a;
border-top:1px solid #0d2d45;
display:flex;
justify-content:space-around;
align-items:center;
color:#9bb1c3;
}

.pay{
padding:30px;
}

.input{
width:100%;
padding:18px;
border-radius:16px;
border:none;
background:#0a2338;
color:white;
margin-bottom:20px;
font-size:20px;
}

.paybtn{
width:100%;
padding:20px;
border-radius:20px;
border:none;
background:#1987c6;
font-size:24px;
color:white;
}

.success{
background:#7ab33b;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.check{
width:110px;
height:110px;
border-radius:100px;
border:6px solid rgba(255,255,255,0.6);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
color:white;
}

.sent{
font-size:32px;
margin-top:20px;
}

.bottom{
position:absolute;
bottom:0;
width:100%;
background:#071a2d;
border-top-left-radius:60px;
border-top-right-radius:60px;
padding:60px 20px 50px;
}

.date{
color:#8fa3b3;
margin-bottom:20px;
}

.name{
font-size:28px;
}

.phone{
color:#a6b8c8;
margin-top:4px;
}

.amount{
font-size:64px;
margin-top:20px;
}

.logo{
margin-top:30px;
width:120px;
}

.bubble{
position:absolute;
background:rgba(255,255,255,0.4);
border-radius:50%;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-600px)}
}

</style>
</head>

<body>

<div id="container" class="container">

<div class="screen home">

<div class="header">
<img src="swisher2.png">
<div>
<div class="title">Swish</div>
<div class="bank">Swedbank</div>
</div>
</div>

<div class="card">
<img src="swisher2.png">
<div class="card-title">Hjälp oss göra Swish ännu bättre</div>
</div>

<div class="card">
<img src="swisher2.png">
<div class="card-title">Lägg till dina favoriter direkt på hemskärmen!</div>
</div>

<div class="buttons">
<button class="btn swish" onclick="go(1)">Swisha</button>
<button class="btn scan">Skanna</button>
</div>

<div class="nav">
<div>Hem</div>
<div>Förfrågningar</div>
<div>Historik</div>
<div>Profil</div>
</div>

</div>

<div class="screen pay">

<input id="name" class="input" placeholder="Namn">
<input id="phone" class="input" placeholder="Telefonnummer">
<input id="amount" class="input" placeholder="Belopp">

<button class="paybtn" onclick="send()">Swisha</button>

</div>

<div id="success" class="screen success" onclick="go(0)">

<div class="check">✓</div>
<div class="sent">Din betalning är skickad!</div>

<div class="bottom">

<div id="date" class="date"></div>
<div id="sname" class="name"></div>
<div id="sphone" class="phone"></div>
<div id="samount" class="amount"></div>

<img src="swisher2.png" class="logo">

</div>

</div>

</div>

<script>

function go(i){
document.getElementById("container").style.transform="translateX(-"+(i*100)+"vw)"
}

function send(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let amount=document.getElementById("amount").value

let d=new Date()

let months=["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"]

let date=d.getDate()+" "+months[d.getMonth()]+". "+d.getFullYear()+", kl "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")

document.getElementById("sname").innerText=name
document.getElementById("sphone").innerText=phone
document.getElementById("samount").innerText=amount+" kr"
document.getElementById("date").innerText=date

go(2)

for(let i=0;i<20;i++)bubble()

}

function bubble(){

let b=document.createElement("div")

b.className="bubble"

let size=Math.random()*20+10

b.style.width=size+"px"
b.style.height=size+"px"
b.style.left=Math.random()*100+"%"
b.style.bottom="-40px"

document.getElementById("success").appendChild(b)

setTimeout(()=>b.remove(),6000)

}

</script>

</body>
</html>
