<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swish App</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#e5f7ef;
display:flex;
justify-content:center;
}

.app{
width:360px;
height:100vh;
background:white;
position:relative;
overflow:hidden;
}

.header{
background:#00a86b;
color:white;
text-align:center;
padding:20px;
font-size:20px;
}

.bubbles{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.bubble{
position:absolute;
width:40px;
height:40px;
background:rgba(0,168,107,0.2);
border-radius:50%;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100vh);}
}

.content{
padding:20px;
}

.button{
display:flex;
align-items:center;
gap:10px;
background:#f2f2f2;
padding:15px;
border-radius:12px;
margin-bottom:10px;
text-decoration:none;
color:black;
}

.button img{
width:30px;
height:30px;
object-fit:contain;
}

.check{
width:24px;
height:24px;
border-radius:4px;
background:#00a86b;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
Swish
</div>

<div class="bubbles">
<div class="bubble" style="left:20%;animation-duration:9s;"></div>
<div class="bubble" style="left:60%;animation-duration:12s;"></div>
<div class="bubble" style="left:80%;animation-duration:7s;"></div>
</div>

<div class="content">

<a class="button" href="index2.html">
<img src="swisher.png">
Swedbank
</a>

<a class="button" href="index3.html">
<img src="swisher.png">
Lägg till dina favoriter
</a>

</div>

</div>

</body>
</html>
