<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Swisher</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #0c1116;
  color: white;
}

.screen { display:none; height:100vh; }
.active { display:flex; flex-direction:column; }

/* HOME (same as before) */
.home {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
}
.logo { width:170px; margin-bottom:40px; }
.main-btn {
  width:80%; max-width:320px; padding:18px; border-radius:14px; border:none;
  background: linear-gradient(180deg,#36a9d6,#1c86b8);
  color:white; font-size:20px; font-weight:600;
}

/* SCREEN 2 EXACT STYLE */
.pay {
  height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar {
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 20px; font-size:24px;
}

.tabs {
  display:flex; justify-content:space-around;
  font-size:18px; color:#7f8b95;
  border-bottom:1px solid #1a222a;
}

.tab-active {
  color:white; position:relative; padding-bottom:10px;
}

.tab-active::after {
  content:"";
  position:absolute; left:0; right:0; bottom:0;
  height:3px; background:#6ec1e4; border-radius:3px;
}

.content {
  flex:1;
  overflow:hidden; /* NO SCROLL */
  padding:10px 0;
}

.card {
  margin:14px 16px;
  border-radius:22px;
  padding:22px;
  background:#0f1620;
  border:1px solid #1a2530;
}

.label {
  font-size:22px;
  color:#9aa4ad;
}

.input {
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0c1116;
  color:white;
  font-size:18px;
  outline:none;
}

.link {
  color:#7ec7ea;
  margin:10px 20px;
}

.bottom {
  padding:16px;
}

.bottom-btn {
  width:100%;
  padding:18px;
  border-radius:18px;
  border:none;
  background: linear-gradient(90deg,#4b8fc5,#6aa6d6);
  color:white;
  font-size:20px;
  font-weight:600;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.bottom-btn img {
  height:26px;
}
</style>
</head>

<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home">
    <img src="swisher.png" class="logo">
    <button class="main-btn" onclick="goToPay()">Swisha</button>
  </div>
</div>

<!-- PAY SCREEN -->
<div id="pay" class="screen pay">

  <div class="topbar">
    <div onclick="goHome()">✕</div>
    <div>?</div>
  </div>

  <div class="tabs">
    <div class="tab-active">Swisha</div>
    <div>Be om</div>
  </div>

  <div class="content">

    <div class="card">
      <div class="label">Mottagare</div>
    </div>

    <div class="card">
      <div class="label">Nummer</div>
      <input class="input" placeholder="">
    </div>

    <div class="card">
      <div class="label">Belopp</div>
      <input class="input" placeholder="">
    </div>

    <div class="card">
      <div class="label">Meddelande</div>
      <input class="input" placeholder="">
    </div>

    <div class="link">Skicka med ett kort</div>

  </div>

  <div class="bottom">
    <button class="bottom-btn">
      Swisha
      <img src="Id.png">
    </button>
  </div>

</div>

<script>
function goToPay(){
  document.getElementById('home').classList.remove('active');
  document.getElementById('pay').classList.add('active');
}

function goHome(){
  document.getElementById('pay').classList.remove('active');
  document.getElementById('home').classList.add('active');
}
</script>

</body>
</html>
